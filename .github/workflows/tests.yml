name: tests
on:
  push:
  pull_request:
    branches: [main]
jobs:
  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests with coverage gate
        run: uv run pytest -q

  # Rollup gate: a single `test` check that branch protection can require.
  # Passes only when every matrix variant passed; fails (does not skip) on any
  # matrix variant failure so the protection sees a definitive signal.
  test:
    needs: test-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "test-matrix result: ${{ needs.test-matrix.result }}"
            exit 1
          fi
          echo "all matrix variants passed"
