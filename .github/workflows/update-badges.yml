name: update-badges

# Refresh the README's coverage % and test-count badges when they drift
# from the actual `tests` workflow run on main. Opens (or updates) a PR
# titled `chore: refresh README badges` when values change. Manual edits
# to the badges are not needed — let CI keep them honest.
#
# Branch protection on `main` rejects direct pushes from CI, so this
# workflow opens a PR via peter-evans/create-pull-request and the standard
# required-checks gate runs against the PR before a human merges it. If
# the values match main already (the common case after a normal merge),
# no PR is opened.
on:
  workflow_run:
    workflows: [tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    # Only update badges after a successful tests run; on workflow_dispatch
    # there's no upstream conclusion so allow it through unconditionally.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests and capture coverage + test count
        id: stats
        run: |
          set -euo pipefail
          # Re-run the suite to capture both signals from a single output.
          # `--cov-fail-under=90` is the project's baseline gate and matches
          # the addopts in pyproject.toml; we leave it on so a coverage drop
          # below the threshold blocks the badge bump (consistent with the
          # tests workflow's contract).
          OUT="$(uv run pytest 2>&1)"
          echo "$OUT"
          # Coverage line looks like: `TOTAL  ...  93%`
          COVERAGE="$(echo "$OUT" | grep -E '^TOTAL' | awk '{print $NF}' | tr -d '%')"
          # Pass-count line looks like: `1089 passed in 14.76s` (or `... passed, ... warnings ...`)
          TESTS="$(echo "$OUT" | grep -oE '[0-9]+ passed' | tail -1 | awk '{print $1}')"
          if [ -z "$COVERAGE" ] || [ -z "$TESTS" ]; then
            echo "Failed to parse coverage or test count from pytest output"
            exit 1
          fi
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "Parsed: coverage=$COVERAGE%, tests=$TESTS"

      - name: Update README badges in place
        env:
          COV: ${{ steps.stats.outputs.coverage }}
          TESTS: ${{ steps.stats.outputs.tests }}
        run: |
          python - <<'PY'
          import os
          import re
          import pathlib

          cov = os.environ["COV"]
          tests = os.environ["TESTS"]
          path = pathlib.Path("README.md")
          src = path.read_text()

          # The shields.io URL pattern (`img.shields.io/badge/coverage-`,
          # `/badge/tests-`) is unique to the static-text badges; the GHA
          # tests-status badge uses `actions/workflows/tests.yml/badge.svg`
          # and is unaffected.
          src = re.sub(
              r"https://img\.shields\.io/badge/coverage-\d+%25-brightgreen\.svg",
              f"https://img.shields.io/badge/coverage-{cov}%25-brightgreen.svg",
              src,
          )
          src = re.sub(
              r"https://img\.shields\.io/badge/tests-\d+-brightgreen\.svg",
              f"https://img.shields.io/badge/tests-{tests}-brightgreen.svg",
              src,
          )
          path.write_text(src)
          PY

      - name: Open PR if badges changed
        uses: peter-evans/create-pull-request@v7
        with:
          # Default GITHUB_TOKEN works because the repo grants `pull-requests: write`
          # at the workflow level (see permissions block above).
          commit-message: "chore: refresh README badges (coverage / test count)"
          title: "chore: refresh README badges"
          body: |
            Auto-generated by `update-badges` workflow.

            Latest values from the `tests` workflow on `main`:

            | Badge | Old (main) | New |
            |---|---|---|
            | Coverage | (see diff) | **${{ steps.stats.outputs.coverage }}%** |
            | Tests passed | (see diff) | **${{ steps.stats.outputs.tests }}** |

            If the diff is empty, this PR isn't opened — main already matches.
          branch: bot/update-badges
          delete-branch: true
          base: main
          add-paths: README.md
