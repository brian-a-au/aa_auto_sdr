name: version-sync
on:
  push:
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Check version sync
        run: uv run python scripts/check_version_sync.py
